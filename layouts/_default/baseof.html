{{- $logo := resources.Get "didcomm-logo.svg" -}}
<!DOCTYPE html>
<html>
	<head>
		<title>{{ .Site.Title }}</title>
		<link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css" />
		<script src="https://unpkg.com/htmx.org@2.0.2" integrity="sha384-Y7hw+L/jvKeWIRRkqWYfPcvVxHzVzn5REgzbawhxAuQGwX1XWe70vji+VSeHOThJ" crossorigin="anonymous"></script>
		<script src="https://unpkg.com/htmx-ext-debug@2.0.0/debug.js"></script>
		<link rel="stylesheet" href="https://www.w3schools.com/lib/w3-theme-cyan.css">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet">
<style>
:root {
	--theme-color: #29679c;
	--theme-color-text: #fff;
	--theme-color-inactive-text: #aaa;
}

.w3-theme-l5 {color:#000 !important; background-color:#f0f6fb !important}
.w3-theme-l4 {color:#000 !important; background-color:#cee1f2 !important}
.w3-theme-l3 {color:#000 !important; background-color:#9dc3e5 !important}
.w3-theme-l2 {color:#fff !important; background-color:#6ca5d8 !important}
.w3-theme-l1 {color:#fff !important; background-color:#3a87cb !important}
.w3-theme-d1 {color:#fff !important; background-color:#265d8d !important}
.w3-theme-d2 {color:#fff !important; background-color:#21537e !important}
.w3-theme-d3 {color:#fff !important; background-color:#1d486e !important}
.w3-theme-d4 {color:#fff !important; background-color:#193e5e !important}
.w3-theme-d5 {color:#fff !important; background-color:#15344f !important}

.w3-theme-light {color:#000 !important; background-color:#f0f6fb !important}
.w3-theme-dark {color:#fff !important; background-color:#15344f !important}
.w3-theme-action {color:#fff !important; background-color:#15344f !important}

.w3-theme {color:var(--theme-color-text) !important; background-color:var(--theme-color) !important}
.w3-text-theme {color:#29679c !important}
.w3-border-theme {border-color:#29679c !important}

.w3-hover-theme:hover {color:#fff !important; background-color:#29679c !important}
.w3-hover-text-theme:hover {color:#29679c !important}
.w3-hover-border-theme:hover {border-color:#29679c !important}

.flex {
	display: flex;
}
.flex-center-items {
	justify-content: space-around;
}
.flex-spaced-items {
	justify-content: space-between;
}
.flex-baseline {
	align-items: baseline;
}
.remove-decoration {
	text-decoration: none;
}
body {
	font-family: Inter, sans-serif;
	font-size: 17px;
	font-weight: 400;
	line-height: 24px;
}

.navbar {
	display: flex;
	justify-content: space-between;
	align-items: center;
	padding: 0.75em 2em;
}
.navbar > .links {
	font-size: 13px;
}
#site-search:not(:focus) {
	color: var(--theme-color-inactive-text);
	background-color: var(--theme-color);
}
#site-search:not(:focus)::placeholder {
	color: var(--theme-color-inactive-text);
}

</style>
	</head>
	<body>
		<header class="w3-theme">
			<nav class="navbar">
				<div class="w3-center">
					<a
					hx-get="{{ with .Site.Home.OutputFormats.Get "htmx" }}{{ .RelPermalink }}{{ end }}"
					hx-trigger="click"
					hx-target="#content"
					hx-push-url="{{ .Site.Home.RelPermalink }}"
					hx-swap="innerHTML"
					hx-ext="debug"
					href="{{ .Site.BaseURL }}"
					style="display: flex; align-items: center"
					class="remove-decoration"
					>
						<svg style="display: inline; width: 48px; height: 48px;"><use href="/icons.svg#logo"></use></svg>
						<span style="margin-left: 1em">DIDComm</span>
					</a>
				</div>
				<div class="w3-center" style="flex-grow: 1; display: flex; justify-content: center; margin: 0 2em">
					<input id="site-search" class="w3-input w3-animate-input" style="width: 5em" placeholder="Search..." />
				</div>
				<div class="flex-baseline links">
					<a class="remove-decoration" rel="noreferrer noopener nofollow" href="https://github.com/decentralized-identity/didcomm.org">Github Repo</a> |
					<a class="remove-decoration" rel="noreferrer noopener nofollow" href="https://identity.foundation/didcomm-messaging/spec/v2.1/">Specification</a> |
					<a class="remove-decoration" href="mailto:security@didcomm.org">Security</a>
				</div>
			</nav>
		</header>
		<div id="content">
			{{ block "main" . }}
			<!-- The part of the page that begins to differ between templates -->
			{{ end }}
		</div>
	</body>
</html>
